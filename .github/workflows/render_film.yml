name: Headless Anime Render Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cloud-render:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Setup Virtual Display & Prepare Directories
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb blender ffmpeg zip curl libgl1-mesa-dri libglx-mesa0
        mkdir -p ./output
        mkdir -p ./assets
        Xvfb :99 -screen 0 1080x1920x24 &

    - name: Download 73.4MB Character Mesh via Curl
      run: |
        curl -L -o assets/character.glb https://github.com/arsycoxxx-cell/AR-cinema-engine/releases/download/v1.0/character.glb

    - name: Execute Cloud Blender Engine
      env:
        DISPLAY: ":99"
        LIBGL_ALWAYS_SOFTWARE: "1"
        MESA_GL_VERSION_OVERRIDE: "3.3"
      run: |
        blender -b -P scripts/render_pipeline.py

    - name: Print Live Debug Console Logs
      run: |
        ls -la ./output/
        if [ -f ./output/CRASH_LOG.txt ]; then
          echo "=== CRASH LOG DETECTED ==="
          cat ./output/CRASH_LOG.txt
        fi

    - name: Package Output Assets
      run: |
        zip -r anime_master_pack.zip ./output/

    - name: Push Download to GitHub Releases
      uses: softprops/action-gh-release@v1
      with:
        files: anime_master_pack.zip
        tag_name: render-build-${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

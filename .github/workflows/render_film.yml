name: Headless Anime Render Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cloud-render:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install System Dependencies & Download Asset
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb blender zip curl
        mkdir -p ./output
        mkdir -p ./assets
        curl -L -o assets/character.glb https://github.com/arsycoxxx-cell/AR-cinema-engine/releases/download/v1.0/character.glb
        Xvfb :99 -screen 0 1080x1920x24 &

    - name: Run Blender Render
      env:
        DISPLAY: ":99"
      run: |
        blender -b -P scripts/render_pipeline.py

    - name: Verify Output Files
      run: |
        ls -la ./output/

    - name: Package & Publish Zip
      run: |
        zip -r anime_master_pack.zip ./output/

    - name: Push to GitHub Releases
      uses: softprops/action-gh-release@v1
      with:
        files: anime_master_pack.zip
        tag_name: render-build-${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
